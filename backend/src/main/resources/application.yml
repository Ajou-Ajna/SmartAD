spring:
  datasource:
    url: jdbc:h2:mem:smartadv
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

smartadv:
  storage:
    mock-s3-dir: ${SMARTADV_STORAGE_DIR:../mock-s3-storage}
  cors:
    allowed-origins: ${SMARTADV_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  engine:
    root-dir: ${SMARTADV_ENGINE_ROOT_DIR:..}
    command: ${SMARTADV_ENGINE_COMMAND:poetry run python}
  aws:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET_NAME:}
