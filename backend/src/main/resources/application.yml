spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartadv}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      location: /opt/smartadv/storage/tmp
      max-file-size: 2000MB
      max-request-size: 2000MB

smartadv:
  security:
    admin-emails: ${SMARTADV_ADMIN_EMAILS:}
  storage:
    mock-s3-dir: ${SMARTADV_STORAGE_DIR:../mock-s3-storage}
  cors:
    allowed-origins: ${SMARTADV_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  engine:
    root-dir: ${SMARTADV_ENGINE_ROOT_DIR:..}
    command: ${SMARTADV_ENGINE_COMMAND:poetry run python}
  aws:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET_NAME:}
