spring:
  datasource:
    url: jdbc:h2:mem:smartadv
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

smartadv:
  storage:
    mock-s3-dir: ../mock-s3-storage
